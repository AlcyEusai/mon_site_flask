git add render.yaml
git commit -m "Add render.yaml for deployment"
git push origin main
services:
  - type: web
    name: mon-projet-flask
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask run --host 0.0.0.0 --port 10000
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py
      